<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8">
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
        "mindar-face-three":"https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face-three.prod.js"
      }
    }
    </script>
    <script type="module">
      import * as THREE from 'three';
      import { MindARThree } from 'mindar-face-three';
      
      const mindarThree = new MindARThree({
        container: document.querySelector("#container"),
      });
      const {renderer, scene, camera} = mindarThree;
      
      // Матеріали для маски студента який не встигає)
      const wingMaterial = new THREE.MeshBasicMaterial({
        color: 0x8a2be2, 
        side: THREE.DoubleSide,
        transparent: true,
        opacity: 0.8
      });

      const goldMaterial = new THREE.MeshBasicMaterial({
        color: 0xffd700, 
        side: THREE.DoubleSide
      });

      const gemMaterial = new THREE.MeshBasicMaterial({
        color: 0x00ffff 
      });

      // 1. Створення анкерів для точок обличчя
      const foreheadAnchor = mindarThree.addAnchor(10);  // Лоб (над переніссям)
      const noseAnchor = mindarThree.addAnchor(1);       // Кінчик носа
      const leftEyeAnchor = mindarThree.addAnchor(159);  // Ліве око (центр верхньої повіки)
      const rightEyeAnchor = mindarThree.addAnchor(386); // Праве око (центр верхньої повіки)
      const leftCheekAnchor = mindarThree.addAnchor(234); // Ліва щока (зовнішня частина)
      const rightCheekAnchor = mindarThree.addAnchor(454);// Права щока (зовнішня частина)
      
      // 2. Втомлені очі (симетрично відносно очей)
      const wingGeometry = new THREE.CircleGeometry(0.12, 32);
      
      const leftWing = new THREE.Mesh(wingGeometry, wingMaterial);
      leftWing.position.set(0, 0, 0.01);
      leftWing.scale.set(1.5, 0.8, 1); // Витягуємо по горизонталі
      leftEyeAnchor.group.add(leftWing);
      
      const rightWing = new THREE.Mesh(wingGeometry, wingMaterial);
      rightWing.position.set(0, 0, 0.01);
      rightWing.scale.set(1.5, 0.8, 1);
      rightEyeAnchor.group.add(rightWing);

      // 3. Золоті обідки навколо очей
      const ringGeometry = new THREE.RingGeometry(0.04, 0.05, 32);
      
      const leftRing = new THREE.Mesh(ringGeometry, goldMaterial);
      leftRing.position.set(0, 0, 0.02);
      leftEyeAnchor.group.add(leftRing);

      const rightRing = new THREE.Mesh(ringGeometry, goldMaterial);
      rightRing.position.set(0, 0, 0.02);
      rightEyeAnchor.group.add(rightRing);
      
      // 4. Дорогоцінний камінь пізнання на лобі
      const gemBaseGeo = new THREE.ConeGeometry(0.03, 0.06, 4);
      const gemBase = new THREE.Mesh(gemBaseGeo, goldMaterial);
      gemBase.position.set(0, 0, 0.01);
      gemBase.rotation.x = Math.PI;
      foreheadAnchor.group.add(gemBase);

      const gemGeo = new THREE.SphereGeometry(0.015, 16, 16);
      const gem = new THREE.Mesh(gemGeo, gemMaterial);
      gem.position.set(0, 0, 0.02);
      foreheadAnchor.group.add(gem);
      
      // 5. Підвіски на щоках
      const chainGeometry = new THREE.CylinderGeometry(0.002, 0.002, 0.1, 8);
      
      const leftChain = new THREE.Mesh(chainGeometry, goldMaterial);
      leftChain.position.set(0, -0.05, 0.01); // Зміщення трохи вниз під щоку
      leftCheekAnchor.group.add(leftChain);
      
      const rightChain = new THREE.Mesh(chainGeometry, goldMaterial);
      rightChain.position.set(0, -0.05, 0.01);
      rightCheekAnchor.group.add(rightChain);
      
      // Анімація маски
      let time = 0;
      
      const start = async() => {
        await mindarThree.start();
        renderer.setAnimationLoop(() => {
          time += 0.04;
          
          // Погойдування підвісок на щоках
          leftChain.rotation.z = 0.1 * Math.sin(time * 2);
          rightChain.rotation.z = -0.1 * Math.sin(time * 2);
          
          // Пульсація кристала на лобі
          gem.scale.setScalar(1 + 0.2 * Math.sin(time * 3));
          
          // Легкий рух маски
          const wingScaleY = 0.8 + 0.05 * Math.cos(time);
          leftWing.scale.y = wingScaleY;
          rightWing.scale.y = wingScaleY;
          
          renderer.render(scene, camera);
        });
      }
      
      const startButton = document.querySelector("#startButton");
      const stopButton = document.querySelector("#stopButton");
      
      startButton.addEventListener("click", () => {
        start();
      });
      
      stopButton.addEventListener("click", () => {
        mindarThree.stop();
        mindarThree.renderer.setAnimationLoop(null);
      });
    </script>
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
        background: #120224;
      }
      
      #container {
        width: 100vw;
        height: 100vh;
        position: relative;
        overflow: hidden;
      }
      
      #control {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 2;
        display: flex;
        gap: 12px;
      }
      
      button {
        padding: 14px 28px;
        border: 2px solid #ffd700;
        border-radius: 30px;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        background: rgba(26, 0, 48, 0.8);
        color: #ffd700;
      }
      
      button:hover {
        transform: scale(1.05);
        background: #ffd700;
        color: #120224;
      }
      
      #stopButton {
        border-color: #8a2be2;
        color: #8a2be2;
        background: rgba(15, 0, 31, 0.8);
      }
      
      #stopButton:hover {
        background: #8a2be2;
        color: #fff;
      }
      
      #info {
        position: fixed;
        bottom: 20px;
        left: 20px;
        right: 20px;
        background: rgba(26, 0, 48, 0.85);
        border: 1px solid #8a2be2;
        padding: 15px;
        border-radius: 20px;
        text-align: center;
        color: #fff;
        font-size: 14px;
        z-index: 2;
        backdrop-filter: blur(8px);
      }
    </style>
  </head>
  <body>
    <div id="control">
      <button id="startButton">✨ Одягнути маску студента який не встигає)</button>
      <button id="stopButton">❌ Зняти маску</button>
    </div>
    <div id="container">
    </div>
    <div id="info">
       Увімкніть камеру ! 
    </div>
  </body>
</html>
